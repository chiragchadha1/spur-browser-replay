# Recorder container. The viewer runs on the host, reached via host.docker.internal.
services:
  recorder:
    build: ./browser
    extra_hosts:
      - "host.docker.internal:host-gateway"   # resolves the host on Linux too
    environment:
      HEALTH_URL: http://host.docker.internal:8000/healthz
      TARGET_URL: http://host.docker.internal:8000/demo-target
      EVENT_STREAM_URL: http://host.docker.internal:8000/events
      RRWEB_URL: http://host.docker.internal:8000/static/viewer-core.min.js
      LOOP_FOREVER: "1"
    ports:
      - "9222:9222"   # CDP, for inspection
